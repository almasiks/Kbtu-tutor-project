<div class="login-page">
  <div class="login-card">

    <div class="login-brand">
      <div class="login-logo">K</div>
      <p class="login-brand-name">KBTU <strong>Tutor</strong></p>
    </div>

    <h1 class="login-title">Войдите в аккаунт</h1>
    <p class="login-sub">Введите логин и пароль чтобы продолжить</p>

    @if (error) {
      <div class="login-error">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="#dc2626" stroke-width="1.5"/>
          <path d="M8 5v3.5M8 10.5v.5" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        {{ error }}
      </div>
    }

    <form class="login-form" (ngSubmit)="onSubmit()" #f="ngForm">
      <label class="field">
        <span class="field-label">Имя пользователя</span>
        <input
          class="field-input"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="username"
          required
          autocomplete="username"
        />
      </label>

      <label class="field">
        <span class="field-label">Пароль</span>
        <input
          class="field-input"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </label>

      <button type="submit" class="btn-submit" [disabled]="loading">
        @if (loading) {
          <span class="spinner"></span> Вход…
        } @else {
          Войти
        }
      </button>
    </form>

    <p class="login-footer">
      Нет аккаунта? <a routerLink="/register" class="link">Зарегистрироваться</a>
    </p>

  </div>
</div>
