<div class="register-page">
  <div class="register-card">

    <div class="register-brand">
      <div class="register-logo">K</div>
      <p class="register-brand-name">KBTU <strong>Tutor</strong></p>
    </div>

    <h1 class="register-title">Создать аккаунт</h1>
    <p class="register-sub">Зарегистрируйтесь чтобы находить репетиторов и бронировать уроки</p>

    @if (error) {
      <div class="register-error">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="#dc2626" stroke-width="1.5"/>
          <path d="M8 5v3.5M8 10.5v.5" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        {{ error }}
      </div>
    }

    <form class="register-form" (ngSubmit)="onSubmit()" #f="ngForm">
      <label class="field">
        <span class="field-label">Имя пользователя</span>
        <input
          class="field-input"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="username"
          required
          autocomplete="username"
        />
      </label>

      <label class="field">
        <span class="field-label">Email</span>
        <input
          class="field-input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="email@example.com"
          required
          autocomplete="email"
        />
      </label>

      <label class="field">
        <span class="field-label">Пароль</span>
        <input
          class="field-input"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="минимум 6 символов"
          required
          autocomplete="new-password"
        />
      </label>

      <label class="field">
        <span class="field-label">Повторите пароль</span>
        <input
          class="field-input"
          type="password"
          [(ngModel)]="password2"
          name="password2"
          placeholder="••••••••"
          required
          autocomplete="new-password"
        />
      </label>

      <button type="submit" class="btn-submit" [disabled]="loading">
        @if (loading) {
          <span class="spinner"></span> Регистрация…
        } @else {
          Зарегистрироваться
        }
      </button>
    </form>

    <p class="register-footer">
      Уже есть аккаунт? <a routerLink="/login" class="link">Войти</a>
    </p>

  </div>
</div>
